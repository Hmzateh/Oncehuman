<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon: #00f5c4;
    --neon-dim: #00c49a;
    --neon-glow: rgba(0,245,196,0.6);
    --danger: #ff3c3c;
    --text: #e8f4f0;
    --text-dim: #8ba89f;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  /* BACKGROUND */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: url('bg.jpg') center / cover no-repeat;
  }
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(2,12,10,0.72) 40%,
        rgba(2,12,10,0.88) 100%);
  }

  /* SCANLINE TEXTURE */
  .scanlines {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
  }

  /* MAIN WRAPPER */
  .wrapper {
    position: relative; z-index: 2;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px 20px;
    gap: 0;
  }

  /* HEADLINE */
  .headline {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.5rem, 4.5vw, 3.2rem);
    text-transform: uppercase;
    color: #fff;
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1.1;
    text-shadow:
      0 0 20px rgba(0,245,196,0.4),
      0 0 60px rgba(0,245,196,0.15),
      0 2px 4px rgba(0,0,0,0.8);
    margin-bottom: 10px;
  }
  .headline span { color: var(--neon); }

  /* SUBHEADLINE */
  .subheadline {
    font-size: clamp(0.8rem, 1.8vw, 1.1rem);
    color: var(--text-dim);
    text-align: center;
    max-width: 600px;
    line-height: 1.45;
    font-weight: 500;
    letter-spacing: 0.02em;
    margin-bottom: 14px;
  }

  /* MINI FEATURES */
  .features {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px 14px;
    margin-bottom: 14px;
  }
  .feature {
    font-size: clamp(0.65rem, 1.4vw, 0.85rem);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--neon);
    background: rgba(0,245,196,0.07);
    border: 1px solid rgba(0,245,196,0.2);
    padding: 4px 10px;
    border-radius: 2px;
    white-space: nowrap;
  }

  /* HERO IMAGE */
  .hero-wrap {
    width: 60%;
    max-width: 520px;
    margin-bottom: 14px;
    flex-shrink: 1;
    min-height: 0;
  }
  .hero-wrap img {
    width: 100%;
    height: auto;
    max-height: 34vh;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 0 20px rgba(0,245,196,0.25)) drop-shadow(0 8px 30px rgba(0,0,0,0.7));
  }

  /* CTA BUTTON */
  .cta-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }

  .cta-btn {
    display: inline-block;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(0.85rem, 2.2vw, 1.2rem);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #000;
    background: var(--neon);
    text-decoration: none;
    padding: clamp(12px, 2.5vh, 18px) clamp(28px, 6vw, 54px);
    border-radius: 3px;
    position: relative;
    cursor: pointer;
    outline: none;
    border: none;
    transition: transform 0.15s ease, background 0.15s ease;
    box-shadow:
      0 0 20px var(--neon-glow),
      0 0 50px rgba(0,245,196,0.3),
      0 0 100px rgba(0,245,196,0.1),
      inset 0 1px 0 rgba(255,255,255,0.3);
    animation: pulse 2.2s ease-in-out infinite;
  }

  .cta-btn::before {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 5px;
    background: transparent;
    border: 1px solid var(--neon);
    opacity: 0.5;
    animation: border-pulse 2.2s ease-in-out infinite;
  }

  .cta-btn::after {
    content: '▶';
    margin-left: 10px;
    font-size: 0.8em;
    vertical-align: middle;
  }

  .cta-btn:hover {
    background: #fff;
    transform: scale(1.04) translateY(-2px);
    box-shadow:
      0 0 30px var(--neon-glow),
      0 0 80px rgba(0,245,196,0.5),
      0 0 140px rgba(0,245,196,0.2),
      inset 0 1px 0 rgba(255,255,255,0.4);
    animation: none;
  }

  .cta-btn:active { transform: scale(0.98) translateY(0); }

  .cta-small {
    font-size: clamp(0.6rem, 1.2vw, 0.72rem);
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* DECORATIVE CORNER BRACKETS */
  .corner { position: fixed; width: 40px; height: 40px; z-index: 3; opacity: 0.4; }
  .corner::before, .corner::after { content: ''; position: absolute; background: var(--neon); }
  .corner.tl { top: 14px; left: 14px; }
  .corner.tl::before { width: 2px; height: 100%; top: 0; left: 0; }
  .corner.tl::after  { width: 100%; height: 2px; top: 0; left: 0; }
  .corner.tr { top: 14px; right: 14px; }
  .corner.tr::before { width: 2px; height: 100%; top: 0; right: 0; }
  .corner.tr::after  { width: 100%; height: 2px; top: 0; right: 0; }
  .corner.bl { bottom: 14px; left: 14px; }
  .corner.bl::before { width: 2px; height: 100%; bottom: 0; left: 0; }
  .corner.bl::after  { width: 100%; height: 2px; bottom: 0; left: 0; }
  .corner.br { bottom: 14px; right: 14px; }
  .corner.br::before { width: 2px; height: 100%; bottom: 0; right: 0; }
  .corner.br::after  { width: 100%; height: 2px; bottom: 0; right: 0; }

  /* ANIMATIONS */
  @keyframes pulse {
    0%, 100% {
      box-shadow: 0 0 20px var(--neon-glow), 0 0 50px rgba(0,245,196,0.3), 0 0 100px rgba(0,245,196,0.1), inset 0 1px 0 rgba(255,255,255,0.3);
    }
    50% {
      box-shadow: 0 0 30px var(--neon-glow), 0 0 80px rgba(0,245,196,0.5), 0 0 160px rgba(0,245,196,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
    }
  }

  @keyframes border-pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.015); }
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .hero-wrap { width: 82%; }
    .subheadline { font-size: 0.78rem; padding: 0 8px; }
    .features { gap: 5px 8px; }
    .corner { width: 28px; height: 28px; }
  }

  /* VERY SHORT SCREENS */
  @media (max-height: 640px) {
    .subheadline { display: none; }
    .features { margin-bottom: 8px; }
    .hero-wrap { margin-bottom: 10px; }
  }
</style>

<body>

<div class="bg"></div>
<div class="scanlines"></div>

<!-- Corner decorations -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="wrapper">

  <h1 class="headline">Only <span>Survivors</span><br>Make It Out Alive</h1>

  <p class="subheadline">
    Explore a contaminated open world, build your base, craft powerful weapons
    and fight terrifying creatures in Once Human.
  </p>

  <div class="features">
    <div class="feature">🌍 Open World Survival</div>
    <div class="feature">🏗 Build Your Base</div>
    <div class="feature">👹 Mutated Creatures</div>
    <div class="feature">👥 Play Solo or Squad</div>
  </div>

  <div class="hero-wrap">
    <img src="hero.jpg" alt="Once Human – Survivor" loading="eager">
  </div>

  <div class="cta-wrap">
    <a
      class="cta-btn"
      href="https://to.wendiro.com/u?k=24c3cf9a5dde4dd896352d1314e9aacd&via=22457"
      id="cta"
      target="_blank"
      rel="noopener"
    >
      Download Free on Steam
    </a>
    <span class="cta-small">Windows PC Only</span>
  </div>

</div>

<script>
  document.getElementById('cta').addEventListener('click', function() {
    fbq('track', 'Lead');
  });
</script>

</body>
</html>
